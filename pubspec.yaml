name: markdown_editor
description: A Flutter app to edit and save markdown files

publish_to: 'none'

version: 2.0.0+8

environment:
  sdk: ^3.11.4
  flutter: 3.41.6

dependencies:
  dynamic_color: ^1.8.1
  expandable: ^5.0.1
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_math_fork: ^0.7.4
  flutter_svg: ^2.2.4
  flutter_widget_from_html_core: ^0.17.2
  google_fonts: ^8.0.2
  html: ^0.15.6
  htmltopdfwidgets: ^2.0.1
  intl: any
  markdown: ^7.3.1
  markdown_widget: ^2.3.2+8
  path_provider: ^2.1.5
  pdf: ^3.12.0
  permission_handler: ^12.0.1
  printing: ^5.14.3
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true